# ERA Comms — nginx site config
# Place this at /etc/nginx/sites-available/era-comms
# then: ln -s /etc/nginx/sites-available/era-comms /etc/nginx/sites-enabled/era-comms

# ERA Comms API
server {
    listen 443 ssl;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # WebSocket support (used for QR codes and session events)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# ERA Hub (admin panel) — serve the built React SPA
server {
    listen 443 ssl;
    server_name hub.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/hub.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/era-hub;
    index index.html;

    # SPA fallback — all unknown paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets forever (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Postal web UI
server {
    listen 443 ssl;
    server_name postal.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/postal.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/postal.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name api.yourdomain.com hub.yourdomain.com postal.yourdomain.com;
    return 301 https://$host$request_uri;
}
