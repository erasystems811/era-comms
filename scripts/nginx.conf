server {
    listen 443 ssl;
    server_name comms.erasystems.com.ng;
    ssl_certificate /etc/letsencrypt/live/comms.erasystems.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comms.erasystems.com.ng/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}
server {
    listen 443 ssl;
    server_name hub.erasystems.com.ng;
    ssl_certificate /etc/letsencrypt/live/comms.erasystems.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comms.erasystems.com.ng/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    root /var/www/era-hub;
    index index.html;
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location / { try_files $uri $uri/ /index.html; }
}
server {
    listen 80;
    server_name comms.erasystems.com.ng hub.erasystems.com.ng;
    return 301 https://$host$request_uri;
}
