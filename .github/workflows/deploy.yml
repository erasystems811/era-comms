name: Deploy ERA Comms

on:
  push:
    branches: [main]

# Era-comms code changes are deployed via era-hub workflow.
# When era-comms is updated, push to era-hub to trigger full server deploy.
# The era-hub workflow SSHes into the server, pulls latest era-comms, and rebuilds Docker.
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Code pushed to era-comms
        run: echo "Era-comms updated. Era-hub workflow will deploy on next push."
